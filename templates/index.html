<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RealMove Hivemind</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; text-align: center; }
        #board { width: 100%; margin-top: 20px; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        #message { color: red; font-weight: bold; margin-top: 15px; }
        #alternatives { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .alt-btn { padding: 8px 12px; cursor: pointer; background-color: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; }
        .alt-btn:hover { background-color: #e0e0e0; }
    </style>
</head>
<body>

    <h2>Play the RealMove</h2>

    <div class="controls">
        <label>Play as:
            <select id="player-color" onchange="changeColor()">
                <option value="w">White</option>
                <option value="b">Black</option>
            </select>
        </label>

        <!-- Updated to accommodate Elo ranges -->
        <label>Elo Range:
            <input type="number" id="elo-min" step="100" value="1000" style="width: 70px;"> to
            <input type="number" id="elo-max" step="100" value="2000" style="width: 70px;">
        </label>

        <label>Start Sequence (e.g. e4 e5 Nf3): <input type="text" id="moves"></label>
        <button onclick="setupBoard()">Setup Board / Start Game</button>
    </div>

    <div id="board"></div>
    <div id="message"></div>
    <!-- New div to hold alternative moves -->
    <div id="alternatives"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        let board = null;
        let game = new Chess();
        const messageEl = document.getElementById('message');
        const alternativesEl = document.getElementById('alternatives');

        function changeColor() {
            const color = document.getElementById('player-color').value;
            board.orientation(color === 'w' ? 'white' : 'black');
        }

        function onDragStart (source, piece, position, orientation) {
            const playerColor = document.getElementById('player-color').value;
            if (game.game_over() || piece.charAt(0) !== playerColor || game.turn() !== playerColor) {
                return false;
            }
        }

        function onDrop(source, target) {
            messageEl.innerText = "";
            alternativesEl.innerHTML = ""; // Clear alternatives when player makes a move

            let move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';
            requestOpponentMove();
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        async function requestOpponentMove() {
            const eloMin = document.getElementById('elo-min').value;
            const eloMax = document.getElementById('elo-max').value;

            const response = await fetch('/get_opponent_move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    fen: game.fen(),
                    elo_min: parseInt(eloMin),
                    elo_max: parseInt(eloMax)
                })
            });

            const data = await response.json();

            if (data.error) {
                messageEl.innerText = data.error;
            } else {
                // Auto-play the highest likelihood move
                game.move(data.move);
                board.position(game.fen());

                // Generate buttons for all alternatives (including the top move)
                data.alternatives.forEach(alt => {
                    const btn = document.createElement('button');
                    btn.className = 'alt-btn';
                    btn.innerText = `${alt.move} (${alt.likelihood}%)`;
                    btn.onclick = () => chooseAlternative(alt.move);
                    alternativesEl.appendChild(btn);
                });
            }
        }

        // Logic for picking a different bot move
        function chooseAlternative(moveSan) {
            game.undo();           // Undo the bot's auto-played move
            game.move(moveSan);    // Apply the alternative move you clicked
            board.position(game.fen()); // Update visual board
            alternativesEl.innerHTML = ""; // Clear choices
        }

        async function setupBoard() {
            messageEl.innerText = "";
            alternativesEl.innerHTML = "";
            const moves = document.getElementById('moves').value;
            const playerColor = document.getElementById('player-color').value;

            const response = await fetch('/setup_board', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ moves: moves })
            });

            const data = await response.json();
            if(data.error) {
                messageEl.innerText = data.error;
            } else {
                game.load(data.fen);
                board.position(game.fen());
                board.orientation(playerColor === 'w' ? 'white' : 'black');

                if (game.turn() !== playerColor) {
                    requestOpponentMove();
                }
            }
        }

        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('board', config);
    </script>
</body>
</html>
